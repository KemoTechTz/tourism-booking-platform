<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxury Experiences - Kemo Tourism OS</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="experiences">
    <div class="app-shell">
      <header class="topbar" id="topbar">
        <a class="brand" href="index.html"><span class="brand-mark">K</span><span><strong>Kemo Tourism OS</strong><small>Premium Tanzania Tourism</small></span></a>
        <button class="menu-toggle" type="button" data-menu-toggle aria-label="Open navigation"><span></span><span></span><span></span></button>
        <nav class="nav-links" id="navLinks" aria-label="Primary navigation"></nav>
      </header>
      <main>
        <section class="page-hero">
          <div class="page-title">
            <p class="eyebrow">Experience Inventory</p>
            <h1>Luxury Experiences</h1>
            <p>Curated premium Tanzania journeys with simulated availability, pricing, reservation logic, guest flow, and booking management.</p>
          </div>
        </section>
        <section class="section compact">
          <div class="filter-bar">
            <label class="filter-field"><span>Search</span><input data-filter="search" placeholder="Safari, beach, honeymoon..." /></label>
            <label class="filter-field"><span>Destination</span><select data-filter="destination"><option>All</option><option>Serengeti</option><option>Zanzibar</option><option>Kilimanjaro</option><option>Ngorongoro</option><option>Mafia Island</option></select></label>
            <label class="filter-field"><span>Category</span><select data-filter="category"><option>All</option><option>Safari</option><option>Beach</option><option>Trekking</option><option>Marine</option><option>Culture</option><option>Honeymoon</option></select></label>
            <label class="filter-field"><span>Luxury Level</span><select data-filter="level"><option>All</option><option>Ultra Luxury</option><option>Presidential</option><option>Elite</option><option>Signature</option><option>Premium</option></select></label>
            <label class="filter-field"><span>Price Range</span><select data-filter="price"><option>All</option><option>Under $1,500</option><option>$1,500 - $2,500</option><option>$2,500+</option></select></label>
            <label class="filter-field"><span>Duration</span><select data-filter="duration"><option>All</option><option>1-3 Days</option><option>4-6 Days</option><option>7+ Days</option></select></label>
            <label class="filter-field"><span>Availability</span><select data-filter="availability"><option>All</option><option>Open</option><option>Limited Availability</option></select></label>
            <label class="filter-field"><span>Sort</span><select data-filter="sort"><option>Featured</option><option>Highest Rated</option><option>Price Low</option><option>Price High</option></select></label>
          </div>
          <div class="experience-grid" id="experienceGrid"></div>
        </section>
      </main>
      <div id="modalRoot"></div>
    </div>
    <script src="./js/data.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/experiences.js"></script>
  </body>
</html>
